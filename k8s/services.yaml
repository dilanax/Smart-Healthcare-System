apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: smart-healthcare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: smart-healthcare/auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/healthcare_db?createDatabaseIfNotExist=true
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: MYSQL_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: MYSQL_PASSWORD
            - name: SERVER_PORT
              value: "8081"
            - name: SPRING_MAIL_HOST
              value: smtp.gmail.com
            - name: SPRING_MAIL_PORT
              value: "587"
            - name: SPRING_MAIL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: SPRING_MAIL_USERNAME
            - name: SPRING_MAIL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: SPRING_MAIL_PASSWORD
            - name: SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH
              value: "true"
            - name: SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE
              value: "true"
            - name: APP_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: healthcare-secrets
                  key: APP_JWT_SECRET
            - name: APP_JWT_EXPIRATION_HOURS
              value: "8"
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: smart-healthcare
spec:
  selector:
    app: auth-service
  ports:
    - port: 8081
      targetPort: 8081
---
