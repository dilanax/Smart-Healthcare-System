apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: healthcare-frontend
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 5173
      protocol: TCP
      nodePort: 30080
  selector:
    app: healthcare-frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: healthcare-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: healthcare-frontend
  template:
    metadata:
      labels:
        app: healthcare-frontend
    spec:
      containers:
        - name: frontend
          image: healthcare/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
          env:
            - name: VITE_API_BASE_URL
              value: http://auth-service:8081
            - name: VITE_NOTIFICATION_API_BASE_URL
              value: http://notification-service:8084
            - name: VITE_PAYMENT_API_BASE_URL
              value: http://payment-service:8086
