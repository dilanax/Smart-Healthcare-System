services:
  # Database
  mysql:
    image: mysql:8.0
    container_name: healthcare-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: healthcare_db
      MYSQL_USER: healthcare
      MYSQL_PASSWORD: 123456
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - healthcare-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Auth Service (Port 8081)
  auth-service:
    build:
      context: ./services/auth-cervice # FIXED TYPO
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/healthcare_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: healthcare
      SPRING_DATASOURCE_PASSWORD: 123456
      SERVER_PORT: 8081 # UNIQUE PORT
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: dilanavishka183@gmail.com
      SPRING_MAIL_PASSWORD: pllb iekj knmu scuc
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
      APP_JWT_SECRET: my-super-secret-key-change-this-in-production
      APP_JWT_EXPIRATION_HOURS: 8
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - healthcare-network

  # Doctor Service (Port 8082)
  doctor-service:
    build:
      context: ./services/doctor-service
      dockerfile: Dockerfile
    container_name: doctor-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/healthcare_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: healthcare
      SPRING_DATASOURCE_PASSWORD: 123456
      SERVER_PORT: 8082 # UNIQUE PORT
    ports:
      - "8082:8082"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - healthcare-network

  # Patient Service (Port 8083)
  patient-service:
    build:
      context: ./services/patient-service
      dockerfile: Dockerfile
    container_name: patient-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/healthcare_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: healthcare
      SPRING_DATASOURCE_PASSWORD: 123456
      SERVER_PORT: 8083
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: 10MB
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: 15MB
      
      # 🚨 ADD THIS LINE! This lets the patient-service read the tokens! 🚨
      APP_JWT_SECRET: my-super-secret-key-change-this-in-production
      
    ports:
      - "8083:8083"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - healthcare-network

  # Notification Service (Port 8084)
  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/healthcare_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: healthcare
      SPRING_DATASOURCE_PASSWORD: 123456
      SERVER_PORT: 8084
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: dilanavishka183@gmail.com
      SPRING_MAIL_PASSWORD: pllb iekj knmu scuc
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
    ports:
      - "8084:8084"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - healthcare-network

  # Appointment Service (Port 8085)
  appointment-service:
    build:
      context: ./services/appointment-service
      dockerfile: Dockerfile
    container_name: appointment-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/healthcare_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: healthcare
      SPRING_DATASOURCE_PASSWORD: 123456
      SERVER_PORT: 8085 # UNIQUE PORT
    ports:
      - "8085:8085"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - healthcare-network

  # Payment Service (Port 8086)
  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/healthcare_db?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: healthcare
      SPRING_DATASOURCE_PASSWORD: 123456
      SERVER_PORT: 8086
      PAYHERE_MERCHANT_ID: "1235016"
      PAYHERE_MERCHANT_SECRET: MTA3ODk5Njg4MzM2Mzk1OTcwNjkzMDkyMzE5NTUyMTA2NzQ5OTk2
    ports:
      - "8086:8086"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - healthcare-network

  # Frontend
 # Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: frontend
    ports:
      - "5173:5173"
    environment:
      # Note: If your frontend needs to talk to ALL these services, 
      # you will need to configure your React Axios calls to point to the respective ports!
      VITE_AUTH_API_URL: http://localhost:8081
      VITE_DOCTOR_API_URL: http://localhost:8082
      VITE_PATIENT_API_URL: http://localhost:8083
      VITE_APPOINTMENT_API_URL: http://localhost:8085
    depends_on:
      - auth-service
      - doctor-service
      - patient-service
      - appointment-service
    networks:
      - healthcare-network

volumes:
  mysql_data:

networks:
  healthcare-network:
    driver: bridge